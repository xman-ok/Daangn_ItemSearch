name: Build DaangnAnalyzer EXE

on:
  push:
    branches:
      - main  # 질문자님의 저장소 메인 브랜치명에 맞게 자동 작동
  workflow_dispatch: # 깃허브 Actions 탭에서 수동으로 빌드 버튼을 누를 수 있게 지원

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit requests beautifulsoup4 openpyxl

    - name: 4. EXE 파일로 빌드
      # [핵심 교정] --collect-all streamlit 옵션을 반드시 적용하여 내부 웹 에셋 누락으로 인한 초기 즉사를 완벽 차단합니다.
      run: |
        pyinstaller --onefile --collect-all streamlit -n DaangnAnalyzer app.py

    - name: 5. 빌드된 EXE 파일 업로드 (배포)
      uses: actions/upload-artifact@v4
      with:
        name: DaangnAnalyzer-Release
        path: dist/DaangnAnalyzer.exe
