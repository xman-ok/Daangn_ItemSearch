name: Build DaangnAnalyzer EXE

on:
  push:
    branches:
      - main  # 사용 중이신 메인 브랜치명에 맞게 작동합니다.
  workflow_dispatch: # 깃허브 Actions 탭에서 수동 빌드 버튼을 활성화합니다.

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit requests beautifulsoup4 openpyxl

    - name: 4. EXE 파일로 빌드
      # [최종 교정 핵심] 
      # --add-data "app.py;." 옵션을 추가했습니다.
      # 이 옵션이 들어가야 임시 가상 폴더 내부에 app.py 원본 파일이 복사되어 Streamlit 엔진이 정상적으로 구동됩니다.
      run: |
        pyinstaller --onefile --collect-all streamlit --add-data "app.py;." -n DaangnAnalyzer app.py

    - name: 5. 빌드된 EXE 파일 업로드 (배포)
      uses: actions/upload-artifact@v4
      with:
        name: DaangnAnalyzer-Release
        path: dist/DaangnAnalyzer.exe
