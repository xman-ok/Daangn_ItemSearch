name: Build DaangnAnalyzer EXE

on:
  push:
    branches:
      - main  # 사용 중이신 메인 브랜치 이름 (필요시 master 등으로 변경)
  workflow_dispatch: # 깃허브에서 수동으로 빌드를 실행할 수 있는 버튼을 활성화합니다.

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 사용 중이신 파이썬 버전에 맞게 조절 가능합니다.

    - name: 3. 필수 라이브러리 설치
      # 당근마켓 크롤러와 스트림릿 구동에 필요한 라이브러리를 가상 서버에 설치합니다.
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit requests beautifulsoup4 openpyxl

    - name: 4. EXE 파일로 빌드
      # [수정 핵심] 
      # 1. 참고용 코드의 main.py 대신 현재 파일명인 app.py로 수정했습니다.
      # 2. 에러 로그가 찍히는 검은 창을 띄우기 위해 --windowed 옵션을 삭제했습니다.
      # 3. 생성되는 파일명을 DaangnAnalyzer.exe로 지정하기 위해 -n 옵션을 추가했습니다.
      run: |
        pyinstaller --onefile -n DaangnAnalyzer app.py

    - name: 5. 빌드된 EXE 파일 업로드 (배포)
      # 빌드가 완료된 DaangnAnalyzer.exe 파일을 깃허브 Actions 결과물에서 다운로드할 수 있게 합니다.
      uses: actions/upload-artifact@v4
      with:
        name: DaangnAnalyzer-Release
        path: dist/DaangnAnalyzer.exe
